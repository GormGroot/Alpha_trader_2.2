# API-nøgler må ALDRIG stå i denne fil – brug .env.

# --- Mægler --------------------------------------------------
broker:
  provider: paper                    # paper | alpaca (paper = lokal simulator, ingen API nødvendig)
  base_url: https://paper-api.alpaca.markets
  api_version: v2

# --- Markedsdata ----------------------------------------------
market_data:
  provider: yfinance            # yfinance | alpha_vantage
  interval: 5m                  # 1m, 5m, 15m, 1h, 1d
  lookback_days: 365
  cache_enabled: true
  cache_dir: data_cache

