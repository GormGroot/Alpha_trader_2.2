# --- Strategi -------------------------------------------------
strategy:
  default: sma_crossover
  sma_crossover:
    short_window: 8             # Faster crossover for intraday/crypto (was 20)
    long_window: 21             # Faster crossover (was 50)
  rsi:
    period: 7                   # More responsive RSI (was 14)
    overbought: 65              # Sell earlier (was 70)
    oversold: 35                # Buy earlier (was 30)
  bollinger:
    window: 20
    num_std: 2

# --- Risikostyring --------------------------------------------
risk:
  max_position_pct: 0.10        # Maks 10 % af portefølje pr. position (8 x 10% = 80% max eksponering)
  max_daily_loss_pct: 0.05      # Stop al handel ved 5 % dagligt tab (was 0.15)
  max_open_positions: 8         # Fokuser kapital (was 30)
  stop_loss_pct: 0.03            # 3% SL — balanceret for aktier+crypto (was 0.015 crypto-only)
  take_profit_pct: 0.05          # 5% TP — giver plads til aktiers daglige bevægelser (was 0.025)
  trailing_stop_pct: 0.025       # 2.5% trailing — undgår unødvendige stop-outs (was 0.012)
  max_drawdown_pct: 0.10        # Stop ALT ved 10 % drawdown (was 0.25)
  max_correlation: 0.85         # Undgå for mange korrelerede positioner

# --- Backtesting ----------------------------------------------
backtest:
  start_date: "2024-01-01"
  end_date: "2025-12-31"
  initial_capital: 100000
  commission_pct: 0.0

# --- Dashboard ------------------------------------------------
dashboard:
  host: 127.0.0.1
  port: 8050
  debug: false
  refresh_interval_seconds: 30

# --- Univers (aktivklasser) ------------------------------------
universe:
  categories:
    us_stocks: true
    nordic_stocks: true
    european_stocks: true
    asian_stocks: true
    emerging_markets: true
    etfs: true
    commodities: true
    crypto: true
    bonds: false
    forex: true

  regions: []
  min_market_cap: 0
  max_symbols_per_scan: 200
  parallel_workers: 8
  batch_size: 50
  watchlist: []

# --- Multi-Broker (Alpha Trader) ---------------------------------
multi_broker:
  enabled: false
  default_currency: DKK

  alpaca:
    enabled: true
    paper: true

  saxo:
    enabled: false
    environment: sim

  ibkr:
    enabled: false
    host: 127.0.0.1
    port: 7497
    client_id: 1

  nordnet:
    enabled: false
    country: dk

# --- Corporate Tax --------------------------------------------
corporate_tax:
  enabled: false
  corporate_rate: 0.22
  lagerbeskatning: true
  tax_credit_initial: 0
  fifo_tracking: true
  db_path: data/tax_corporate.db

# --- Skat (privat) ---------------------------------------------
tax:
  progression_limit: 61000
  low_rate: 0.27
  high_rate: 0.42
  carried_losses: 0.0
  fallback_fx_rate: 6.90
  currency: DKK

# --- Notifikationer --------------------------------------------
notifications:
  enabled: true
  smtp_host: smtp.gmail.com
  smtp_port: 587
  monthly_report: true
  progression_alert: true
  march_reminder: true
  on_trade_executed: true
  on_stop_loss: true
  on_trailing_stop: true
  on_take_profit: true
  on_daily_report: true
  on_drawdown_warning: true
  drawdown_threshold_pct: 0.05

# --- Ops ------------------------------------------------------
ops:
  scheduler_enabled: true
  backup_dir: backups
  backup_retention_days: 30
  pg_host: localhost
  pg_port: 5432
  pg_user: alpha_trader
  pg_database: alpha_trader

# --- Logging --------------------------------------------------
logging:
  level: DEBUG
  file: logs/trading.log
  rotation: 1 day
  retention: 30 days
